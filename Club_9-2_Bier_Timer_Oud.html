<!DOCTPE html> 

<html>
<head>
<title>Bier Timer | Club 9-2</title>
<style>
body{
	text-align: center;
	font-family: Arial, sans-serif;
	text-transform: uppercase;
	background-color: black;
	cursor: pointer;
}
#start, #start2{
	border: 2px solid white;
	border-radius: 5px;
	font-size: 4em;
	text-transform: uppercase;
	color: white;
	background-color: navy;
	cursor: pointer;
	margin: 0;
	padding: 0 5px;
}
#countDown{
	font-size: 17em;
	font-weight: bold;
	color: navy;
	margin: 15px 20px;
	padding: 0;
	background-color: white;
	border: 5px solid yellow;
	visibility: hidden;
	
}
#stop{
	border: 2px solid yellow;
	border-radius: 5px;
	font-size: 4em;
	text-transform: uppercase;
	color: yellow;
	background-color: black;
	cursor: pointer;
	margin: 0;
	padding: 0 5px;
	visibility: hidden;
}
h1{
	color: yellow;
	font-size: 5em;
	margin: 0;
	padding: 0;
}

</style>
</head>
<body>
	<audio id="sound" src="/sounds/biertjes.mp3"></audio>
	<h1>===== Club 9-2 Bier Timer =====</h1>
	<button id="start" onclick="eenKrat()">maak 1 krat koud</button>&nbsp;&nbsp;<button id="start2" onclick="tweeKratten()">maak 2 kratten koud</button> 
	<p id="countDown"></p>
	<button id="stop" onclick="timerOff()">zet alarm uit</button>
<script>
	var timerOn = 0;
	var alarmSwitch = 0;
	var hoelang = 0;
	var i = 0;
	function eenKrat(){
		hoelang = 1;
		bierTimer();
	}
	function tweeKratten() {
		hoelang = 2;
		bierTimer();
	}
	function startTimer(duration, display) {
		var start = Date.now(), diff, minutes, seconds;	
			function timer() {
				diff = duration - (((Date.now() - start) / 1000) | 0);
				minutes = (diff / 60) | 0;
				seconds = (diff % 60) | 0;
				minutes = minutes < 10 ? "0" + minutes : minutes;
				seconds = seconds < 10 ? "0" + seconds : seconds;
				display.textContent = minutes + ":" + seconds; 
				if (diff <= 0) {
					display.textContent = "Bier = koud";
					timerOn = 2;
					clearInterval(timerRunning);
					document.getElementById('start').innerHTML = "haal krat uit de vriezer";
					bierAlarm();
				}
				
			};
			timer();
			var timerRunning = setInterval(timer, 1000);
	}
	function bierAlarm() {
		document.getElementById('stop').style.visibility = "visible";
		function alarmSound(){
			if(timerOn == 0){
				document.getElementById('start').style.border = "2px solid white";
				document.getElementById('start').style.background = "navy";
				document.getElementById('start').style.color = "white";
				document.getElementById('countDown').style.background = "white";
				document.getElementById('countDown').style.color = "navy";
				clearInterval(alarmRunning);
			}
			else if(timerOn == 2){
				if(alarmSwitch == 0){
					document.getElementById('start').style.border = " 2px solid yellow";
					document.getElementById('start').style.background = "red";
					document.getElementById('start').style.color = "yellow";
					document.getElementById('countDown').style.background = "red";
					document.getElementById('countDown').style.color = "yellow";
					alarmSwitch = 1;
				}
				else if(alarmSwitch == 1){
					document.getElementById('start').style.border = "2px solid white";
					document.getElementById('start').style.background = "navy";
					document.getElementById('start').style.color = "white";
					document.getElementById('countDown').style.background = "white";
					document.getElementById('countDown').style.color = "navy";
					alarmSwitch = 0;
				}
				document.getElementById('sound').play()
			}
		}
		alarmSound();
		var alarmRunning = setInterval(alarmSound, 1000);
	}
	function timerOff(){
		timerOn = 0;
		document.getElementById('stop').style.visibility = "hidden";
		document.getElementById('countDown').style.visibility = "hidden";
		document.getElementById('start').innerHTML = "maak 1 krat koud";
		document.getElementById('start2').style.display = "inline";
	}
	function bierTimer() {
		if(timerOn == 0){
			timerOn = 1;
			document.getElementById('countDown').style.visibility = "visible";
			document.getElementById('start').innerHTML = "Er staat bier in de vriezer";
			document.getElementById('start2').style.display = "none";
			if(hoelang == 1){
				var duurtLang = 60 * 50;
			}
			if(hoelang == 2){
				var duurtLang = 60 * 92;
			}
			display = document.querySelector('#countDown');
			startTimer(duurtLang, display);
		}
	};
	
	window.onbeforeunload = function(){
		if (timerOn == 1){
			return "HET BIER IS NOG NIET KOUD!!!!!!!!!!!!!";
		}
		else if(timerOn == 2){
			return "HAAL EERST BIER UIT DE VRIEZER!!!!!!!!!!!!!";
		}
	}
</script>
	
</body>
</html>
