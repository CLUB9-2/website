<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">

  <link rel="icon" href="img/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css?v=20260420d">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="supabase-client.js"></script>
</head>
<body>
  <div id="nav-placeholder"></div>
  <main id="main">
  <h5 style="text-align: center;">CLUB 9-2 Soundboard</h5>
  <div class="grid-soundboard">
    <button data-sound="sounds/biertjes.mp3">Biertjes</button>

    <button data-sound="sounds/komuitdatbed.mp3">Uit Bed</button>
    <button data-sound="sounds/perfectgast.mp3">Perfect Gast</button>
    <button data-sound="sounds/ovenaanzetten.mp3">Oven Aanzetten</button>
    <button data-sound="sounds/twanboer.mp3">Boer</button>
    <button data-sound="sounds/fust.mp3">Fust</button>
    <button data-sound="sounds/gvdalwin.mp3">Godverdomme Alwin</button>
    <button data-sound="sounds/standaarddrinker.mp3">Standaard Drinker</button>
    <button data-sound="sounds/meneerdepraeses.mp3">Koert</button>
    <button data-sound="sounds/nietleuk.mp3">Niet Leuk</button>
    <button data-sound="sounds/zuigen.mp3">Zuigen</button>
    <button data-sound="sounds/kijkheerlijk.mp3">Kijk, Heerlijk</button>
    <button data-sound="sounds/demuur.mp3">De Muur</button>
    <button data-sound="sounds/hetescaleert.mp3">Het Escaleert</button>
    <button data-sound="sounds/water.mp3">WATER?</button>
    <button data-sound="sounds/masturberen.mp3">Masten</button>
    <button data-sound="sounds/lulvaneenvent.mp3">Lul</button>

    <button data-sound="sounds/ongemakkelijk.mp3">Ongemakkelijk</button>
    <button data-sound="sounds/koffiemetpeuk.mp3">Koffie Met Peuk</button>
    <button data-sound="sounds/jaikkanwel.mp3">Ja, Ik kan wel...</button>
    <button data-sound="sounds/praten.mp3">Hoor jij mij?</button>
    <button data-sound="sounds/kibbelingsong.mp3">Kibbeling Lied</button>
    <button data-sound="sounds/tsjoch.mp3">Tsjoch!</button>
    <button data-sound="sounds/ciaotutti.mp3">Ciao Tutti!</button>

    <button data-sound="sounds/tijdvoorbier.mp3">Tijd Voor Bier!</button>
    <button data-sound="sounds/onethisch.mp3">Onethisch</button>

    
  </div>
</main>
<script>
  // Select all buttons inside the soundboard
  const buttons = document.querySelectorAll('.grid-soundboard button');
  let currentAudio = null; // keep track of the currently playing audio

  buttons.forEach(button => {
    button.addEventListener('click', () => {
      const soundFile = button.dataset.sound;

      // If another audio is playing, stop it
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0; // reset to start
      }

      // Create and play new audio
      currentAudio = new Audio(soundFile);
      currentAudio.play();
    });
  });
</script>

<script src="auth.js"></script>
<script src="nav-loader.js"></script>
</body>
</html>
