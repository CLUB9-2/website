<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Stoner Visuals — CLUB 9-2</title>
  <meta name="description" content="Hypnotiserende, psychedelische visuals.">
  <link rel="icon" href="img/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css?v=20260420g">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="supabase-client.js"></script>
  <style>
    /* Page-specific: the canvas should own the viewport below the nav.
       We avoid fixed positioning so the nav stays on top and the skip-link
       still works. */
    .sv-wrap {
      position: relative;
      width: 100%;
      height: calc(100vh - 70px);
      min-height: 420px;
      overflow: hidden;
      background: #000;
    }
    #sv-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .sv-controls {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px 14px;
      background: rgba(0, 5, 36, 0.65);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 5;
      max-width: calc(100% - 32px);
    }
    .sv-controls button {
      margin: 0;
      padding: 8px 14px;
      font-size: 0.95rem;
      min-height: 0;
      min-width: 0;
      box-shadow: none;
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .sv-controls button:hover {
      background: var(--bg-hover);
      transform: none;
      box-shadow: none;
    }
    .sv-controls button.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    .sv-controls .sv-sep {
      width: 1px;
      background: var(--border);
      margin: 0 4px;
    }
    .sv-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 4px 10px;
      background: rgba(0, 5, 36, 0.5);
      border-radius: var(--radius);
      pointer-events: none;
      z-index: 5;
    }
    @media (max-width: 800px) {
      .sv-wrap { height: calc(100vh - 62px); }
      .sv-controls { top: 8px; padding: 6px 8px; gap: 6px; }
      .sv-controls button { padding: 6px 10px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <main id="main">
    <div class="sv-wrap">
      <canvas id="sv-canvas"></canvas>

      <div class="sv-controls" role="toolbar" aria-label="Visual-instellingen">
        <button type="button" data-mode="plasma" class="active">Plasma</button>
        <button type="button" data-mode="kaleido">Kaleidoscoop</button>
        <button type="button" data-mode="tunnel">Tunnel</button>
        <button type="button" data-mode="flow">Flow Field</button>
        <span class="sv-sep" aria-hidden="true"></span>
        <button type="button" id="sv-pause" aria-pressed="false">Pauze</button>
        <button type="button" id="sv-fullscreen">Fullscreen</button>
      </div>

      <div class="sv-hint">Tik of klik ergens om het patroon te beïnvloeden</div>
    </div>
  </main>

  <script>
  (function () {
    const canvas = document.getElementById('sv-canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const controlButtons = document.querySelectorAll('.sv-controls button[data-mode]');
    const pauseBtn = document.getElementById('sv-pause');
    const fsBtn = document.getElementById('sv-fullscreen');
    const wrap = canvas.parentElement;

    let mode = 'plasma';
    let paused = false;
    let t0 = performance.now();
    let t = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let W = 0, H = 0;
    // Interaction: a "focus point" that modes can optionally use.
    let fx = 0.5, fy = 0.5;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = wrap.getBoundingClientRect();
      W = Math.max(1, Math.floor(rect.width));
      H = Math.max(1, Math.floor(rect.height));
      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      // Reset trail buffer on resize for modes that use it
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      if (mode === 'plasma') ensurePlasmaBuffer();
      if (mode === 'flow') initFlowParticles();
    }

    window.addEventListener('resize', resize);

    function setMode(next) {
      mode = next;
      controlButtons.forEach(b => b.classList.toggle('active', b.dataset.mode === next));
      // Clear canvas on mode switch so one mode's trails don't bleed into the next
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
      if (mode === 'plasma') ensurePlasmaBuffer();
      if (mode === 'flow') initFlowParticles();
    }
    controlButtons.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));

    pauseBtn.addEventListener('click', () => {
      paused = !paused;
      pauseBtn.textContent = paused ? 'Hervat' : 'Pauze';
      pauseBtn.setAttribute('aria-pressed', String(paused));
      if (!paused) { t0 = performance.now() - t; requestAnimationFrame(loop); }
    });

    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        wrap.requestFullscreen && wrap.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen && document.exitFullscreen();
      }
    });
    document.addEventListener('fullscreenchange', resize);

    // Pointer → focus point used by some modes
    function updateFocus(e) {
      const r = canvas.getBoundingClientRect();
      const p = (e.touches && e.touches[0]) ? e.touches[0] : e;
      fx = (p.clientX - r.left) / r.width;
      fy = (p.clientY - r.top) / r.height;
    }
    canvas.addEventListener('mousemove', updateFocus);
    canvas.addEventListener('touchmove', (e) => { updateFocus(e); e.preventDefault(); }, { passive: false });
    canvas.addEventListener('click', updateFocus);

    /* ----------------------- Mode: PLASMA ----------------------- *
     * Classic sine-interference plasma. We render at reduced
     * resolution into an ImageData buffer and upscale via drawImage.
     * Full per-pixel at device resolution is too expensive. */
    let plasmaBuf = null, plasmaBufW = 0, plasmaBufH = 0, plasmaImg = null;
    const PLASMA_W = 200; // internal res; scales up smoothly
    function ensurePlasmaBuffer() {
      plasmaBufW = PLASMA_W;
      plasmaBufH = Math.max(1, Math.round(PLASMA_W * (H / W)));
      plasmaImg = ctx.createImageData(plasmaBufW, plasmaBufH);
      plasmaBuf = plasmaImg.data;
    }
    function drawPlasma(time) {
      if (!plasmaBuf || plasmaBufH !== Math.max(1, Math.round(PLASMA_W * (H / W)))) {
        ensurePlasmaBuffer();
      }
      const tt = time * 0.0006;
      const cx = fx * plasmaBufW, cy = fy * plasmaBufH;
      let i = 0;
      for (let y = 0; y < plasmaBufH; y++) {
        for (let x = 0; x < plasmaBufW; x++) {
          const dx = x - cx, dy = y - cy;
          const v = Math.sin(x * 0.06 + tt) +
                    Math.sin(y * 0.08 + tt * 1.3) +
                    Math.sin((x + y) * 0.05 + tt * 0.7) +
                    Math.sin(Math.sqrt(dx * dx + dy * dy) * 0.08 + tt * 1.8);
          // v is roughly in [-4, 4]; map to 0..1
          const n = (v + 4) / 8;
          // Color: three offset sine palettes → smooth psychedelic gradient
          const r = 128 + 127 * Math.sin(6.283 * n + tt);
          const g = 128 + 127 * Math.sin(6.283 * n + 2.094 + tt * 1.1);
          const b = 128 + 127 * Math.sin(6.283 * n + 4.188 + tt * 0.9);
          plasmaBuf[i++] = r | 0;
          plasmaBuf[i++] = g | 0;
          plasmaBuf[i++] = b | 0;
          plasmaBuf[i++] = 255;
        }
      }
      // Put to an offscreen canvas then scale up (putImageData doesn't scale)
      plasmaOffscreen.width = plasmaBufW;
      plasmaOffscreen.height = plasmaBufH;
      plasmaOffCtx.putImageData(plasmaImg, 0, 0);
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(plasmaOffscreen, 0, 0, plasmaBufW, plasmaBufH, 0, 0, W, H);
    }
    const plasmaOffscreen = document.createElement('canvas');
    const plasmaOffCtx = plasmaOffscreen.getContext('2d');

    /* ----------------------- Mode: KALEIDOSCOPE ----------------------- *
     * Draw a handful of moving colored arcs in one wedge, then mirror
     * that wedge N times around the center using rotation + scale(-1,1). */
    function drawKaleido(time) {
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(0, 0, W, H);
      const cx = W / 2, cy = H / 2;
      const slices = 8;
      const sliceAngle = (Math.PI * 2) / slices;
      const radius = Math.max(W, H) * 0.7;
      ctx.save();
      ctx.translate(cx, cy);
      for (let s = 0; s < slices; s++) {
        ctx.save();
        ctx.rotate(s * sliceAngle);
        if (s % 2 === 1) ctx.scale(-1, 1);
        // Clip to one wedge
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, -sliceAngle / 2, sliceAngle / 2);
        ctx.closePath();
        ctx.clip();
        // Draw some colored blobs inside the wedge
        const tt = time * 0.0008;
        for (let i = 0; i < 6; i++) {
          const a = tt * (0.6 + i * 0.17) + i;
          const r = radius * (0.15 + 0.6 * (0.5 + 0.5 * Math.sin(tt * 0.9 + i * 1.7)));
          const px = Math.cos(a) * r;
          const py = Math.sin(a * 1.3) * r * 0.7;
          const rad = radius * (0.08 + 0.04 * Math.sin(tt * 2 + i));
          const hue = (time * 0.06 + i * 55) % 360;
          const grad = ctx.createRadialGradient(px, py, 0, px, py, rad);
          grad.addColorStop(0, 'hsla(' + hue + ', 100%, 65%, 0.9)');
          grad.addColorStop(1, 'hsla(' + hue + ', 100%, 50%, 0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(px, py, rad, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
      ctx.restore();
    }

    /* ----------------------- Mode: TUNNEL ----------------------- *
     * Classic texture-less tunnel: for each pixel compute (angle, depth)
     * from center, then sample a procedural color. We do this at reduced
     * resolution (like plasma) for perf. */
    const TUNNEL_W = 240;
    let tunnelImg = null, tunnelBuf = null, tunnelH = 0;
    const tunnelOffscreen = document.createElement('canvas');
    const tunnelOffCtx = tunnelOffscreen.getContext('2d');
    function ensureTunnelBuffer() {
      tunnelH = Math.max(1, Math.round(TUNNEL_W * (H / W)));
      tunnelImg = ctx.createImageData(TUNNEL_W, tunnelH);
      tunnelBuf = tunnelImg.data;
    }
    function drawTunnel(time) {
      if (!tunnelBuf || tunnelH !== Math.max(1, Math.round(TUNNEL_W * (H / W)))) {
        ensureTunnelBuffer();
      }
      const tt = time * 0.001;
      const cx = fx * TUNNEL_W, cy = fy * tunnelH;
      let i = 0;
      for (let y = 0; y < tunnelH; y++) {
        for (let x = 0; x < TUNNEL_W; x++) {
          const dx = x - cx, dy = y - cy;
          const dist = Math.sqrt(dx * dx + dy * dy) + 0.001;
          const angle = Math.atan2(dy, dx);
          // Depth = 1/dist → creates the "tunnel" compression
          const u = 12 / dist + tt * 0.8;        // depth scroll
          const v = angle / Math.PI;              // angular coord
          // Checker-ish pattern in (u,v) + color cycle
          const stripe = 0.5 + 0.5 * Math.sin(u * 6.28);
          const ring = 0.5 + 0.5 * Math.sin(v * 12 + tt);
          const mix = stripe * ring;
          const hue = (u * 40 + tt * 60) % 360;
          // HSL → RGB inline (fast-ish)
          const c = mix;                         // 0..1 lightness
          const h6 = ((hue / 60) % 6 + 6) % 6;
          const f = h6 - Math.floor(h6);
          const q = c * (1 - f);
          const p = 0;
          let r = 0, g = 0, b = 0;
          switch (Math.floor(h6)) {
            case 0: r = c; g = c * f; b = p; break;
            case 1: r = q; g = c; b = p; break;
            case 2: r = p; g = c; b = c * f; break;
            case 3: r = p; g = q; b = c; break;
            case 4: r = c * f; g = p; b = c; break;
            case 5: r = c; g = p; b = q; break;
          }
          // Vignette darkening at very center simulates depth
          const vig = Math.min(1, dist * 0.06);
          tunnelBuf[i++] = (r * 255 * vig) | 0;
          tunnelBuf[i++] = (g * 255 * vig) | 0;
          tunnelBuf[i++] = (b * 255 * vig) | 0;
          tunnelBuf[i++] = 255;
        }
      }
      tunnelOffscreen.width = TUNNEL_W;
      tunnelOffscreen.height = tunnelH;
      tunnelOffCtx.putImageData(tunnelImg, 0, 0);
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(tunnelOffscreen, 0, 0, TUNNEL_W, tunnelH, 0, 0, W, H);
    }

    /* ----------------------- Mode: FLOW FIELD ----------------------- *
     * N particles, each frame: sample a smooth (sin/cos based) vector
     * field at the particle's position, step forward, draw a short line.
     * We paint a translucent black rect each frame to create trails. */
    const FLOW_COUNT = 800;
    const flow = [];
    function initFlowParticles() {
      flow.length = 0;
      for (let i = 0; i < FLOW_COUNT; i++) {
        flow.push({
          x: Math.random() * W,
          y: Math.random() * H,
          hue: Math.random() * 360,
          life: Math.random() * 200
        });
      }
    }
    function drawFlow(time) {
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      ctx.fillRect(0, 0, W, H);
      const tt = time * 0.0003;
      ctx.lineWidth = 1.1;
      for (let i = 0; i < flow.length; i++) {
        const p = flow[i];
        // Smooth pseudo-noise vector field
        const nx = Math.sin(p.x * 0.006 + tt) + Math.cos(p.y * 0.008 - tt * 1.1);
        const ny = Math.cos(p.x * 0.007 - tt * 0.9) + Math.sin(p.y * 0.005 + tt);
        const angle = Math.atan2(ny, nx) + tt * 0.5;
        const speed = 1.4;
        const nxp = p.x + Math.cos(angle) * speed;
        const nyp = p.y + Math.sin(angle) * speed;
        ctx.strokeStyle = 'hsla(' + ((p.hue + time * 0.03) % 360) + ', 85%, 62%, 0.55)';
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(nxp, nyp);
        ctx.stroke();
        p.x = nxp; p.y = nyp;
        p.life--;
        // Respawn when off-screen or lifespan ends
        if (p.life <= 0 || p.x < -5 || p.x > W + 5 || p.y < -5 || p.y > H + 5) {
          p.x = Math.random() * W;
          p.y = Math.random() * H;
          p.hue = Math.random() * 360;
          p.life = 120 + Math.random() * 200;
        }
      }
    }

    /* ----------------------- Main loop ----------------------- */
    function loop(now) {
      if (paused) return;
      t = now - t0;
      switch (mode) {
        case 'plasma':  drawPlasma(t);  break;
        case 'kaleido': drawKaleido(t); break;
        case 'tunnel':  drawTunnel(t);  break;
        case 'flow':    drawFlow(t);    break;
      }
      requestAnimationFrame(loop);
    }

    // Boot
    resize();
    requestAnimationFrame(loop);

    // Respect reduced-motion: pause by default if user prefers it
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      paused = true;
      pauseBtn.textContent = 'Hervat';
      pauseBtn.setAttribute('aria-pressed', 'true');
    }
  })();
  </script>

  <script src="auth.js"></script>
  <script src="nav-loader.js"></script>
</body>
</html>
